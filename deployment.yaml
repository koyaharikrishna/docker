apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app
        # FIX 1: Remove the leading slash and use the name you used in 'docker build'
        image: my-java-app:latest 
        # FIX 2: Ensure this matches the port your Java app actually listens on
        ports:
        - containerPort: 8080 
---
apiVersion: v1
kind: Service
metadata:
  name: java-service
spec:
  type: NodePort
  selector:
    app: java-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30008